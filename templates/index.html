{% extends "base.html" %}

{% block title %}Articles{% endblock title %}

{% block content %}
<h1>Articles</h1>
<ul class="post-list">
    {% for post in posts %}
    <li>
        <span>{{ post.published_at }}</span>
        <a href="posts/{{ post.file_name }}.html">{{ post.title }}</a>
    </li>
    {% endfor %}
</ul>
{% endblock content %}
